version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/runtime:/app/backend/runtime
      - ./backend/app/data:/app/backend/app/data

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend/bolt.app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://backend:8000
      VITE_WS_URL: ws://localhost:8000/ws/live
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - backend
